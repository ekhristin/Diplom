          echo ""
          echo "Application Pods:"
          kubectl get pods -n app-test-web -l app=app-test-web || echo "  Поды не найдены"
          
          echo ""
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
      
      - name: Wait for Ingress to be ready
        if: steps.check_flag.outputs.action == 'apply' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
        env:
          KUBECONFIG: ${{ env.KUBECONFIG }}
        run: |
          export KUBECONFIG="${KUBECONFIG:-$HOME/.kube/config}"
          echo "Ожидание готовности Ingress Controller..."
          echo "⚠️  В Yandex Cloud назначение внешнего IP для LoadBalancer может занять до 10-15 минут"
          
          # Ждем получения внешнего IP для Ingress Controller (увеличиваем время ожидания)
          INGRESS_IP=""
          MAX_ATTEMPTS=60  # 60 попыток = 10 минут
          for i in $(seq 1 $MAX_ATTEMPTS); do
            INGRESS_IP=$(kubectl get service ingress-nginx-controller -n ingress-nginx -o jsonpath='{.status.loadBalancer.ingress[0].ip}' 2>/dev/null || echo "")
            if [ -n "$INGRESS_IP" ] && [ "$INGRESS_IP" != "<pending>" ] && [ "$INGRESS_IP" != "null" ]; then
              echo "✓ Ingress Controller получил внешний IP: $INGRESS_IP"
              echo "INGRESS_IP=$INGRESS_IP" >> $GITHUB_ENV
              break
            fi
            
            # Показываем статус каждые 5 попыток
            if [ $((i % 5)) -eq 0 ]; then
              echo "Ожидание внешнего IP для Ingress Controller... ($i/$MAX_ATTEMPTS)"
              echo "Текущий статус сервиса:"
              kubectl get service ingress-nginx-controller -n ingress-nginx -o wide || true
            fi
            sleep 10
          done
          
          # Если IP все еще не получен, выводим предупреждение, но продолжаем
          if [ -z "$INGRESS_IP" ] || [ "$INGRESS_IP" == "<pending>" ] || [ "$INGRESS_IP" == "null" ]; then
            echo "⚠️  Внешний IP для LoadBalancer еще не назначен после $MAX_ATTEMPTS попыток"
            echo "   Это нормально для Yandex Cloud - назначение IP может занять до 15-20 минут"
            echo "   Проверьте статус позже командой:"
            echo "   kubectl get service ingress-nginx-controller -n ingress-nginx"
            echo ""
            echo "   Или используйте адрес кластера для доступа:"
            CLUSTER_ENDPOINT="${{ steps.k8s_info.outputs.cluster_endpoint }}"
            CLUSTER_HOST=$(echo "$CLUSTER_ENDPOINT" | sed 's|https\?://||' | sed 's|:.*||')
            echo "   Адрес кластера: $CLUSTER_HOST"
            echo "INGRESS_IP=$CLUSTER_HOST" >> $GITHUB_ENV
          fi
      
      - name: Get deployment information and credentials
        if: steps.check_flag.outputs.action == 'apply' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
        id: deployment_info
        env:
          KUBECONFIG: ${{ env.KUBECONFIG }}
        run: |
          export KUBECONFIG="${KUBECONFIG:-$HOME/.kube/config}"
          echo "Получение информации о развертывании..."
          
          # Получаем адрес для доступа
          CLUSTER_HOST=""
          
          # Проверяем, есть ли реальный внешний IP LoadBalancer
          INGRESS_IP_CHECK=$(kubectl get service ingress-nginx-controller -n ingress-nginx -o jsonpath='{.status.loadBalancer.ingress[0].ip}' 2>/dev/null || echo "")
          
          if [ -n "$INGRESS_IP_CHECK" ] && [ "$INGRESS_IP_CHECK" != "<pending>" ] && [ "$INGRESS_IP_CHECK" != "null" ]; then
            CLUSTER_HOST="$INGRESS_IP_CHECK"
            echo "✓ Используется внешний IP LoadBalancer: $CLUSTER_HOST"
          elif [ -n "${{ env.INGRESS_IP }}" ]; then
            CLUSTER_HOST="${{ env.INGRESS_IP }}"
            echo "Используется адрес из окружения: $CLUSTER_HOST"
          else
            # Используем адрес кластера как fallback
            CLUSTER_ENDPOINT="${{ steps.k8s_info.outputs.cluster_endpoint }}"
            CLUSTER_HOST=$(echo "$CLUSTER_ENDPOINT" | sed 's|https\?://||' | sed 's|:.*||')
            echo "⚠️  Используется адрес кластера (внешний IP LoadBalancer еще не назначен): $CLUSTER_HOST"
          fi
          
          # Получаем учетные данные Grafana из Secret
          echo "Получение учетных данных Grafana..."
          GRAFANA_USERNAME="admin"
          
          # Пытаемся получить пароль из различных возможных Secret
          GRAFANA_PASSWORD=""
          
          # Вариант 1: Secret с именем grafana-admin
          GRAFANA_PASSWORD=$(kubectl get secret grafana-admin -n monitoring -o jsonpath='{.data.admin-password}' 2>/dev/null | base64 -d 2>/dev/null || echo "")
          
          # Вариант 2: Secret с меткой app.kubernetes.io/name=grafana
          if [ -z "$GRAFANA_PASSWORD" ]; then
            GRAFANA_PASSWORD=$(kubectl get secret -n monitoring -l app.kubernetes.io/name=grafana -o jsonpath='{.items[0].data.admin-password}' 2>/dev/null | base64 -d 2>/dev/null || echo "")
          fi
          
          # Вариант 3: Ищем любой Secret в namespace monitoring с admin-password
          if [ -z "$GRAFANA_PASSWORD" ]; then
            for secret in $(kubectl get secrets -n monitoring -o name 2>/dev/null); do
              GRAFANA_PASSWORD=$(kubectl get $secret -n monitoring -o jsonpath='{.data.admin-password}' 2>/dev/null | base64 -d 2>/dev/null || echo "")
              if [ -n "$GRAFANA_PASSWORD" ]; then
                break
              fi
            done
          fi
          
          # Если пароль не найден, используем значение по умолчанию для kube-prometheus
          if [ -z "$GRAFANA_PASSWORD" ]; then
            GRAFANA_PASSWORD="admin"
            echo "⚠️  Пароль Grafana не найден в Secrets, используется значение по умолчанию: admin"
          else
            echo "✓ Пароль Grafana успешно получен из Secret"
          fi
          
          # Формируем ссылки (всегда через LoadBalancer, без NodePort)
          APP_URL="http://${CLUSTER_HOST}/app"
          GRAFANA_URL="http://${CLUSTER_HOST}/"
          
          # Сохраняем в outputs для использования в следующем шаге
          echo "app_url=$APP_URL" >> $GITHUB_OUTPUT
          echo "grafana_url=$GRAFANA_URL" >> $GITHUB_OUTPUT
          echo "grafana_username=$GRAFANA_USERNAME" >> $GITHUB_OUTPUT
          echo "grafana_password=$GRAFANA_PASSWORD" >> $GITHUB_OUTPUT
          echo "cluster_host=$CLUSTER_HOST" >> $GITHUB_OUTPUT
      
      - name: Display deployment information
        if: steps.check_flag.outputs.action == 'apply' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
        run: |
          echo ""
          echo "╔════════════════════════════════════════════════════════════════╗"
