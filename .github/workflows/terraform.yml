          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "📱 ПРИЛОЖЕНИЕ"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "🔗 Ссылка для доступа: ${{ steps.deployment_info.outputs.app_url }}"
          echo ""
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "📊 GRAFANA"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "🔗 Ссылка для доступа: ${{ steps.deployment_info.outputs.grafana_url }}"
          echo "👤 Имя пользователя: ${{ steps.deployment_info.outputs.grafana_username }}"
          echo "🔑 Пароль: ${{ steps.deployment_info.outputs.grafana_password }}"
          echo ""
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "ℹ️  ДОПОЛНИТЕЛЬНАЯ ИНФОРМАЦИЯ"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "🌐 Адрес для доступа: ${{ steps.deployment_info.outputs.cluster_host }}"
          echo "📦 Имя кластера: ${{ steps.k8s_info.outputs.cluster_name }}"
          echo "🆔 ID кластера: ${{ steps.k8s_info.outputs.cluster_id }}"
          echo ""
          INGRESS_IP_CHECK=$(kubectl get service ingress-nginx-controller -n ingress-nginx -o jsonpath='{.status.loadBalancer.ingress[0].ip}' 2>/dev/null || echo "")
          INGRESS_TYPE=$(kubectl get service ingress-nginx-controller -n ingress-nginx -o jsonpath='{.spec.type}' 2>/dev/null || echo "")
          
          echo "Тип сервиса Ingress Controller: $INGRESS_TYPE"
          
          if [ -z "$INGRESS_IP_CHECK" ] || [ "$INGRESS_IP_CHECK" == "<pending>" ] || [ "$INGRESS_IP_CHECK" == "null" ]; then
            echo "⚠️  ВНИМАНИЕ: Внешний IP для LoadBalancer еще не назначен."
            echo "   В Yandex Cloud это может занять до 15-20 минут после создания сервиса."
            echo "   Проверьте статус командой:"
            echo "   kubectl get service ingress-nginx-controller -n ingress-nginx"
            echo ""
            echo "   После назначения IP, приложение будет доступно по адресу:"
            echo "   http://<EXTERNAL-IP>/app"
            echo "   Grafana будет доступна по адресу:"
            echo "   http://<EXTERNAL-IP>/"
            echo ""
          else
            echo "✓ Внешний IP LoadBalancer назначен: $INGRESS_IP_CHECK"
          fi
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo ""
          echo "✅ Все компоненты успешно развернуты!"
          echo ""
          
          # Также выводим в формате для GitHub Actions summary
          cat >> $GITHUB_STEP_SUMMARY << EOF
          # 🎉 Развертывание успешно завершено
          
          ## 📱 Приложение
          
          **Ссылка для доступа:** [${{ steps.deployment_info.outputs.app_url }}](${{ steps.deployment_info.outputs.app_url }})
          
          ## 📊 Grafana
          
          **Ссылка для доступа:** [${{ steps.deployment_info.outputs.grafana_url }}](${{ steps.deployment_info.outputs.grafana_url }})
          
          **Учетные данные:**
          - **Имя пользователя:** \`${{ steps.deployment_info.outputs.grafana_username }}\`
          - **Пароль:** \`${{ steps.deployment_info.outputs.grafana_password }}\`
          
          ## ℹ️ Дополнительная информация
          
          - **Адрес кластера:** \`${{ steps.deployment_info.outputs.cluster_host }}\`
          - **Имя кластера:** \`${{ steps.k8s_info.outputs.cluster_name }}\`
          - **ID кластера:** \`${{ steps.k8s_info.outputs.cluster_id }}\`
          
          ---
          
          ✅ Все компоненты успешно развернуты и готовы к использованию!
          EOF
      
      - name: Get registry information for cleanup
        if: steps.check_flag.outputs.action == 'destroy' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
        id: registry_cleanup_info
        working-directory: ./infrastructure
        run: |
          echo "Получение информации о Container Registry для очистки..."
          REGISTRY_ID=$(terraform output -raw registry_id 2>/dev/null || echo "")
          REGISTRY_NAME=$(terraform output -raw registry_name 2>/dev/null || echo "")
          
          if [ -n "$REGISTRY_ID" ]; then
            echo "registry_id=$REGISTRY_ID" >> $GITHUB_OUTPUT
            echo "REGISTRY_ID=$REGISTRY_ID" >> $GITHUB_ENV
            echo "✓ Container Registry ID: $REGISTRY_ID"
          fi
          
          if [ -n "$REGISTRY_NAME" ]; then
            echo "registry_name=$REGISTRY_NAME" >> $GITHUB_OUTPUT
            echo "REGISTRY_NAME=$REGISTRY_NAME" >> $GITHUB_ENV
            echo "✓ Container Registry Name: $REGISTRY_NAME"
          fi
          
          if [ -z "$REGISTRY_ID" ] && [ -z "$REGISTRY_NAME" ]; then
            echo "⚠️  Информация о Container Registry не найдена в Terraform outputs"
            echo "   Возможно, registry уже удален или не был создан"
          fi
      
      - name: Clean up Container Registry images
        if: steps.check_flag.outputs.action == 'destroy' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master') && steps.registry_cleanup_info.outputs.registry_id != ''
        run: |
          export PATH=$PATH:$HOME/yandex-cloud/bin
          echo "Очистка образов из Container Registry перед удалением..."
          
          REGISTRY_ID="${{ steps.registry_cleanup_info.outputs.registry_id }}"
          
          if [ -z "$REGISTRY_ID" ]; then
            echo "⚠️  Registry ID не найден, пропускаем очистку"
            exit 0
          fi
          
          echo "Получение списка образов в registry: $REGISTRY_ID"
          
          # Получаем список всех образов в registry
          IMAGES=$(yc container image list --registry-id "$REGISTRY_ID" --format json 2>/dev/null || echo "[]")
          
          if [ "$IMAGES" != "[]" ] && [ -n "$IMAGES" ]; then
            echo "Найдено образов для удаления:"
            echo "$IMAGES" | jq -r '.[] | "  - \(.id)"' 2>/dev/null || echo "$IMAGES"
            
            # Удаляем каждый образ
            if command -v jq &> /dev/null; then
              # Используем jq для парсинга JSON
              IMAGE_IDS=$(echo "$IMAGES" | jq -r '.[].id' | tr '\n' ' ')
              for image_id in $IMAGE_IDS; do
                if [ -n "$image_id" ] && [ "$image_id" != "null" ]; then
                  echo "Удаление образа: $image_id"
                  yc container image delete "$image_id" --quiet 2>&1 || echo "⚠️  Не удалось удалить образ: $image_id"
                fi
              done
            else
              # Простой парсинг без jq
              IMAGE_IDS=$(echo "$IMAGES" | grep -o '"id":"[^"]*"' | sed 's/"id":"\([^"]*\)"/\1/' | tr '\n' ' ')
              for image_id in $IMAGE_IDS; do
                if [ -n "$image_id" ]; then
                  echo "Удаление образа: $image_id"
                  yc container image delete "$image_id" --quiet 2>&1 || echo "⚠️  Не удалось удалить образ: $image_id"
                fi
              done
            fi
            
            echo "✓ Очистка образов завершена"
          else
            echo "✓ Registry пуст, образы отсутствуют"
          fi
          
          # Дополнительная проверка - пытаемся удалить все образы по имени registry
          echo ""
          echo "Проверка наличия оставшихся образов..."
          sleep 2
          REMAINING_IMAGES=$(yc container image list --registry-id "$REGISTRY_ID" --format json 2>/dev/null || echo "[]")
          if [ "$REMAINING_IMAGES" != "[]" ] && [ -n "$REMAINING_IMAGES" ]; then
            echo "⚠️  Обнаружены оставшиеся образы, повторная попытка удаления..."
            if command -v jq &> /dev/null; then
              REMAINING_IDS=$(echo "$REMAINING_IMAGES" | jq -r '.[].id' | tr '\n' ' ')
              for image_id in $REMAINING_IDS; do
                if [ -n "$image_id" ] && [ "$image_id" != "null" ]; then
                  yc container image delete "$image_id" --quiet 2>&1 || true
                fi
              done
            fi
          fi
          
          echo "✓ Очистка Container Registry завершена"
      
      - name: Terraform Destroy
        if: steps.check_flag.outputs.action == 'destroy' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
        working-directory: ./infrastructure
        run: terraform destroy -auto-approve -no-color
      
      - name: Infrastructure removal notice
        if: steps.check_flag.outputs.action == 'destroy' && (github.ref != 'refs/heads/main' && github.ref != 'refs/heads/master')
        run: |
          echo "::warning::Удаление инфраструктуры (terraform destroy) выполняется только для веток main/master"
          echo "Текущая ветка: ${{ github.ref }}"
          echo "Для удаления инфраструктуры выполните workflow в ветке main или master"

